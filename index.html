<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dato- og batchkalkulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 15px;
      background: #f5f5f5;
      color: #222;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 6px;
    }

    .top-info {
      margin-top: 8px;
      color: #555;
      font-size: 15px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select,
    input,
    button {
      width: 100%;
      max-width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    input[type="date"] {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
      background: white;
    }

    input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 1;
    }

    .date-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .date-buttons button {
      flex: 1;
      margin-top: 0;
    }

    button {
      background: black;
      color: white;
      border: none;
      margin-top: 12px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #eef3ff;
      border-radius: 10px;
      line-height: 1.6;
    }

    .small {
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }

    .footer-info {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Dato- og batchkalkulator</h2>
  <div id="currentDateTime" class="top-info">Laster dato og klokkeslett...</div>

  <label for="startDate">Startdato:</label>
  <input type="date" id="startDate">

  <div class="date-buttons">
    <button type="button" id="prevDayBtn">←</button>
    <button type="button" id="todayBtn">I dag</button>
    <button type="button" id="nextDayBtn">→</button>
  </div>

  <label for="product">Produkt:</label>
  <select id="product">
    <option value="16" data-label="2 uker og 2 dager">Burrata</option>
    <option value="24" data-label="3 uker og 3 dager">Revet</option>
    <option value="24" data-label="3 uker og 3 dager">Stracciatella</option>
    <option value="24" data-label="3 uker og 3 dager">Mozzarella 125 gram</option>
    <option value="24" data-label="3 uker og 3 dager">Mozzarella 10 gram</option>
  </select>

  <div class="small" id="durationInfo"></div>

  <button type="button" id="calculateBtn">Beregn</button>

  <div class="result" id="result">
    Velg parametere og trykk «Beregn».
  </div>

  <div id="lastUpdate" class="footer-info">
    Laster versjonsinformasjon...
  </div>
</div>

<script>
  function formatDate(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return day + '.' + month + '.' + year;
  }

  function formatInputDate(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return year + '-' + month + '-' + day;
  }

  function updateDateTime() {
    const now = new Date();

    const formatted = now.toLocaleString('no-NO', {
      weekday: 'long',
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });

    document.getElementById('currentDateTime').textContent =
      'Dato og klokkeslett: ' + formatted;
  }

  function setToday() {
    const today = new Date();
    document.getElementById('startDate').value = formatInputDate(today);
  }

  function changeDay(offset) {
    const input = document.getElementById('startDate');

    if (!input.value) {
      setToday();
      return;
    }

    const date = new Date(input.value + 'T00:00:00');
    date.setDate(date.getDate() + offset);

    input.value = formatInputDate(date);
  }

  function calculateBatchNumber(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = String(date.getFullYear()).slice(-2);

    const number = parseInt(day + month + year, 10);
    return number * 2;
  }

  function updateDurationInfo() {
    const select = document.getElementById('product');
    const option = select.options[select.selectedIndex];
    const days = option.value;
    const label = option.getAttribute('data-label');

    document.getElementById('durationInfo').textContent =
      'Varighet: ' + label + ' (' + days + ' dager)';
  }

  function calculate() {
    const select = document.getElementById('product');
    const option = select.options[select.selectedIndex];

    const days = parseInt(option.value, 10);
    const label = option.getAttribute('data-label');
    const productName = option.textContent;
    const startValue = document.getElementById('startDate').value;
    const result = document.getElementById('result');

    if (!startValue) {
      result.textContent = 'Velg dato først.';
      return;
    }

    const startDate = new Date(startValue + 'T00:00:00');
    const endDate = new Date(startDate);
    endDate.setDate(endDate.getDate() + days);

    const batchNumber = calculateBatchNumber(startDate);

    result.innerHTML =
      '<strong>Produkt:</strong> ' + productName + '<br>' +
      '<strong>Startdato:</strong> ' + formatDate(startDate) + '<br>' +
      '<strong>Holdbarhet:</strong> ' + label + ' (' + days + ' dager)<br>' +
      '<strong>Batchnummer:</strong> ' + batchNumber + '<br>' +
      '<strong>Siste forbruksdato:</strong> ' + formatDate(endDate);
  }

  function loadLastCommit() {
    const owner = 'dymyrson1';
    const repo = 'Toddum-G-rd';
    const url = `https://api.github.com/repos/${owner}/${repo}/commits`;

    fetch(url)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('HTTP error');
        }
        return response.json();
      })
      .then(function(data) {
        if (!Array.isArray(data) || data.length === 0) {
          throw new Error('No commit data');
        }

        const lastCommit = data[0];
        const date = new Date(lastCommit.commit.author.date);

        const formatted = date.toLocaleString('no-NO', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        document.getElementById('lastUpdate').textContent =
          'Version: ' + formatted;
      })
      .catch(function() {
        document.getElementById('lastUpdate').textContent =
          'Kunne ikke hente versjonsinformasjon';
      });
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('todayBtn').addEventListener('click', setToday);
    document.getElementById('prevDayBtn').addEventListener('click', function() {
      changeDay(-1);
    });
    document.getElementById('nextDayBtn').addEventListener('click', function() {
      changeDay(1);
    });
    document.getElementById('calculateBtn').addEventListener('click', calculate);
    document.getElementById('product').addEventListener('change', updateDurationInfo);

    updateDateTime();
    setInterval(updateDateTime, 1000);

    setToday();
    updateDurationInfo();
    loadLastCommit();
  });
</script>

</body>
</html>
